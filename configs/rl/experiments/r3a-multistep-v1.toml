version = "r3a-multistep-v1"
policy_schema = "teacher-v1"
action_schema = "deployment-v1"
deployable = false
observation_provenance = "privileged_simulator"
transfer_gate = "R4 causal tracker and input calibration pending"
diagnostic_scope = "same-environment-pool recurrent collector and curriculum coordinator"

[smoke_run]
lanes = 16
updates = 4
torch_threads = 4
seed = 20260722

[collector]
version = "recurrent-collector-config-v1"
max_decisions = 128
target_simulated_ticks = 32768
gamma_tick = 1.0
lambda_tick = 0.9862327044933592
checkpoint_boundary = "after_complete_optimizer_update"
bootstrap_observation = "transition_next_observation"
tick_budget_overshoot = "one_complete_synchronous_decision_row"

[reward]
composer_version = "reward-composer-v1"
raw = "score_after - score_before"
scale = 1000.0
shaping_weight_unit = "integer_parts_per_million"
coefficient_lifetime = "one_episode"
score_only_weight_ppm = 0
clip = false

[curriculum]
version = "curriculum-v1"
coordinator_version = "curriculum-coordinator-v1"
assignment_sampler = "sha256_counter_per_lane_episode_library_contract"
assignment_to_adapter_status = "pending_transactional_snapshot_initializer"
prior_stage_mix_ppm = 200000
prior_stage_mix_execution = "pending_transactional_snapshot_initializer"
promotion_data = "fixed_validation_recipes"
regression_behavior = "monotone_unlock_with_remediation"
environment_topology = "one_fixed_config_hash_per_collector_pool"
snapshot_initializer = "separate_R3b_integration_gate"
benchmark_scope = "score_only_collector_systems_smoke"

[ppo]
total_updates = 1000
learning_rate = 0.0001
final_learning_rate_fraction = 0.1
epochs = 4
lane_minibatch_size = 8
clip_ratio = 0.2
value_clip = 0.2
value_coefficient = 0.5
entropy_coefficient = 0.01
max_gradient_norm = 0.5
target_kl = 0.03

[acceptance]
exact_resume = "next_actions_state_hashes_gae_update_and_parameters"
required_action_branches = ["wait", "fire_weak", "fire_strong"]
requires_variable_elapsed_ticks = true
requires_terminal_and_truncation_coverage = true
requires_zero_invalid_actions = true
requires_raw_score_audit = true
