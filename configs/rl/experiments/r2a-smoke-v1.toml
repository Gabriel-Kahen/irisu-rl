version = "r2a-smoke-v1"
policy_schema = "teacher-v1"
critic_schema = "teacher-v1"
action_schema = "deployment-v1"
deployable = false
observation_provenance = "privileged_simulator"
transfer_gate = "R4 tracker/input calibration pending"

[runtime]
device = "cpu"
dtype = "float32"
deterministic_algorithms = true
torch_intraop_threads = 8
torch_interop_threads = 1
compile = false
automatic_mixed_precision = false

[model]
global_hidden = 96
body_hidden = 96
fused_hidden = 192
recurrent_hidden = 192
recurrent_layers = 1
minimum_concentration = 1.001
coordinate_concentration_log_bias = 2.0

[reward]
raw = "score_after - score_before"
optimizer_scale = 1.0
optimizer_scale_status = "provisional until R2b frozen exploratory comparison"
clip = false
shaping_weight = 0.0

[smdp]
gamma_tick = 1.0
trace_half_life_seconds = 1.0
lambda_tick = 0.9862327044933592
interrupted_nonbootstrap_truncation = "audit but exclude from policy/value loss"

[ppo]
learning_rate = 0.0003
candidate_learning_rates = [0.0001, 0.0003, 0.0006]
final_learning_rate_fraction = 0.1
epochs = 4
lane_minibatch_size = 8
clip_ratio = 0.2
value_clip = 0.2
value_coefficient = 0.5
entropy_coefficient = 0.01
max_gradient_norm = 0.5
target_kl = 0.03
